<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IT Support System - Lab 21</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <header>
            <h1>IT Support System <span class="badge">Lab 21</span></h1>
        </header>

        <section class="ticket-form">
            <h2>Abrir Nuevo Ticket</h2>
            <form id="form-ticket">
                <input type="text" id="usuario" placeholder="Nombre de usuario" required>
                <input type="text" id="asunto" placeholder="Asunto del problema" required>
                <select id="prioridad">
                    <option value="Baja">Baja</option>
                    <option value="Media" selected>Media</option>
                    <option value="Alta">Alta</option>
                </select>
                <button type="submit">Crear Ticket</button>
            </form>
        </section>

        <section class="ticket-list">
            <h2>Tickets Activos</h2>
            <table>
                <thead>
                    <tr>
                        <th>ID</th>
                        <th>Usuario</th>
                        <th>Asunto</th>
                        <th>Prioridad</th>
                        <th>Estado</th>
                    </tr>
                </thead>
                <tbody id="tabla-tickets">
                    <!-- Los tickets se cargan aquí -->
                </tbody>
            </table>
        </section>
    </div>
    <script src="script.js"></script>
</body>
</html>
