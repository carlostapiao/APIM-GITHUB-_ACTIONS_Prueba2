name: "CI/CD - IT Support System v8"

on:
  push:
    branches:
      - main

jobs:
  deploy:
    name: "Deploy"
    runs-on: ubuntu-latest
    env:
      ARM_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
      ARM_CLIENT_SECRET: ${{ secrets.AZURE_CLIENT_SECRET }}
      ARM_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
      ARM_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}

    steps:
      - name: "Checkout Code"
        uses: actions/checkout@v3

      # --- 1. TERRAFORM ---
      - name: "Setup Terraform"
        uses: hashicorp/setup-terraform@v2

      - name: "Terraform Init"
        run: terraform init

      - name: "Terraform Apply"
        run: |
          terraform apply -auto-approve \
            -var="subscription_id=${{ secrets.AZURE_SUBSCRIPTION_ID }}" \
            -var="db_password=${{ secrets.DB_PASSWORD }}"

      # --- 2. AZURE LOGIN & ACR ---
      - name: "Azure Login"
        uses: azure/login@v1
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: "Build and Push to ACR"
        run: |
          az acr login --name acrcarlos69lmv8
          docker build -t acrcarlos69lmv8.azurecr.io/support-app:latest ./app
          docker push acrcarlos69lmv8.azurecr.io/support-app:latest

      # --- 3. DATABASE SETUP (SQL) ---
      - name: "Setup Database Table"
        uses: azure/sql-action@v2
        with:
          connection-string: "Server=tcp:sqlserver-carlos-lab.database.windows.net,1433;Initial Catalog=SupportDB;Persist Security Info=False;User ID=sqladmin;Password=${{ secrets.DB_PASSWORD }};MultipleActiveResultSets=False;Encrypt=True;TrustServerCertificate=False;Connection Timeout=30;"
          sql-file: "./scripts/init.sql"

      # --- 4. KUBERNETES DEPLOY ---
      - name: "Get AKS Credentials"
        run: |
          az aks get-credentials --resource-group rg-k8s-lab --name aks-lab --overwrite-existing

      - name: "Create SQL Secret"
        run: |
          kubectl delete secret sql-secret --ignore-not-found
          kubectl create secret generic sql-secret --from-literal=password='${{ secrets.DB_PASSWORD }}'

      - name: "Deploy to AKS"
        run: |
          kubectl apply -f k8s/deployment.yaml
          kubectl apply -f k8s/service.yaml
          kubectl apply -f k8s/ingress.yaml

      # --- 5. SYNC APIM WITH AKS INTERNAL IP ---
      - name: "Sync Internal IP with APIM"
        run: |
          # Obtenemos la IP privada del Ingress Controller para que el APIM sepa a dónde ir
          INGRESS_IP=$(kubectl get svc -n ingress-nginx ingress-nginx-controller -o jsonpath='{.status.loadBalancer.ingress[0].ip}')
          echo "La IP del Ingress es: $INGRESS_IP"
          
          # Actualizamos el Backend del APIM
          az apim api update --resource-group rg-k8s-lab \
            --service-name apimcarlos69lmv8 \
            --api-id tickets-api \
            --service-url "http://$INGRESS_IP/tickets"

      - name: "Check Deployment Status"
        run: kubectl rollout status deployment/support-app-deployment